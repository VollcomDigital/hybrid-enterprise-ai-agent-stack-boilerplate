name: codeql

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # Python only. Do not add javascript/typescript — there is no JS/TS source; a JS DB would fail finalize.
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        # Keep init/autobuild/analyze on the same major (v3). Mixing v3 init with v4 analyze can mis-resolve languages.
        uses: github/codeql-action/analyze@v3
