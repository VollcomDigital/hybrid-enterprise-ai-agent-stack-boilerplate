http:
  middlewares:
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        customFrameOptionsValue: DENY
        forceSTSHeader: true
        permissionsPolicy: "camera=(), geolocation=(), microphone=()"
        referrerPolicy: no-referrer
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        contentSecurityPolicy: "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: https:; object-src 'none'; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
